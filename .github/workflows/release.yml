name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test

      - name: Check for Signing Secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Release APK
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: ./gradlew assembleRelease

      - name: Setup Build Tools Version
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          BUILD_TOOLS_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
          echo "BUILD_TOOLS_VERSION=$BUILD_TOOLS_VERSION" >> $GITHUB_ENV

      - name: Sign APK
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: ${{ env.BUILD_TOOLS_VERSION }}

      - name: Prepare Signed APK
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          cp ${{ steps.sign_app.outputs.signedReleaseFile }} lazydex-${{ github.ref_name }}-beta.apk

      - name: Build Debug Fallback APK
        if: steps.check_secrets.outputs.has_secrets == 'false'
        run: |
          echo "::warning::Signing secrets are missing. Building a Debug-signed APK as fallback."
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk lazydex-${{ github.ref_name }}-beta.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lazydex-${{ github.ref_name }}-beta.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: true
          generate_release_notes: true
