name: Release Builder

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare-build:
    name: Prepare Release Build
    runs-on: 'ubuntu-24.04'
    outputs:
      VERSION_TAG: ${{ steps.get_tag.outputs.VERSION_TAG }}
      CURRENT_SHA: ${{ steps.current_commit.outputs.CURRENT_SHA }}
      PREV_RELEASE_SHA: ${{ steps.previous_commit.outputs.PREV_RELEASE_SHA }}
      COMMIT_LOGS: ${{ steps.commit_logs.outputs.COMMIT_LOGS }}
      PREV_TAG_NAME: ${{ steps.previous_commit.outputs.PREV_TAG_NAME }}
    steps:
      - name: Get tag name (${{ github.ref }})
        id: get_tag
        run: |
          version_tag=$(echo ${GITHUB_REF/refs\/tags\//} | sed -r 's/^refs\/(heads|tags)\///' | sed -r 's/[-\/]+/_/g')
          echo "VERSION_TAG=$version_tag"
          echo "VERSION_TAG=$version_tag" >> $GITHUB_OUTPUT

      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous release
        id: last_release
        uses: InsonusK/get-latest-release@7a9ff16c8c6b7ead5d71c0f1cc61f2703170eade # v1.1.0
        with:
          myToken: ${{ github.token }}
          exclude_types: "draft|prerelease"
          view_top: 1

      - name: Current commit
        id: current_commit
        run: |
          commit_count=$(git rev-list --count HEAD)
          current_sha=$(git rev-parse --short HEAD)
          echo "COMMIT_COUNT=$commit_count" >> $GITHUB_OUTPUT
          echo "CURRENT_SHA=$current_sha" >> $GITHUB_OUTPUT

      - name: Previous commit
        id: previous_commit
        run: |
          if [ -z "${{ steps.last_release.outputs.tag_name }}" ]; then
            # No previous release found, compare with first commit
            first_commit=$(git rev-list --max-parents=0 HEAD | head -n 1)
            prev_release_sha=$(git rev-parse --short "$first_commit")
            prev_tag_name="$prev_release_sha"
          else
            prev_tag_name="${{ steps.last_release.outputs.tag_name }}"
            commit_count_diff=$(git rev-list --count "${prev_tag_name}"..HEAD)

            if [ -z "${commit_count_diff}" ] || [ "${commit_count_diff}" -eq 0 ]; then
              commit_count_diff=1
            fi
            prev_release_sha=$(git rev-parse --short HEAD~$commit_count_diff)
          fi

          echo "PREV_RELEASE_SHA=$prev_release_sha" >> $GITHUB_OUTPUT
          echo "PREV_TAG_NAME=$prev_tag_name" >> $GITHUB_OUTPUT

      - name: Commit logs
        id: commit_logs
        run: |
          echo "COMMIT_LOGS<<{delimiter}" >> $GITHUB_OUTPUT
          curl -s -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/lazy2dev/lazydex/compare/${{ steps.previous_commit.outputs.PREV_RELEASE_SHA }}...${{ steps.current_commit.outputs.CURRENT_SHA }}" \
            | jq '[.commits[]|{message:(.commit.message | split("\n")), username:(.author.login // "unknown")}]' \
            | jq -r '.[] | "- \(.message | first) (@\(.username))"' >> $GITHUB_OUTPUT
          echo "{delimiter}" >> $GITHUB_OUTPUT

  build-app:
    name: Build App
    runs-on: 'ubuntu-24.04'
    needs: prepare-build
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Build APKs
        run: ./gradlew assembleRelease assembleDebug

      - name: Upload Unsigned Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 1

      - name: Upload Debug Fallback APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  release-app:
    name: Release App
    runs-on: 'ubuntu-24.04'
    needs:
      - prepare-build
      - build-app
    steps:
      - name: Check for Signing Secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi

      - name: Download Unsigned APK
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: actions/download-artifact@v4
        with:
          name: app-release-unsigned
          path: release_apk

      - name: Download Debug APK
        if: steps.check_secrets.outputs.has_secrets == 'false'
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: debug_apk

      - name: Sign APK
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: r0adkll/sign-android-release@f30bdd30588842ac76044ecdbd4b6d0e3e813478
        with:
          releaseDirectory: release_apk
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '35.0.1'

      - name: Rename Signed APK
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          # The sign action puts the signed apk under the releaseDirectory with suffix '-signed' or similar.
          # Let's find it and rename it to the target version-tag-specific filename.
          signed_file=$(find release_apk -name "*-signed.apk" | head -n 1)
          if [ -n "$signed_file" ]; then
            mv "$signed_file" "lazydex-${{ needs.prepare-build.outputs.VERSION_TAG }}.apk"
          else
            echo "Signed APK not found!" && exit 1
          fi

      - name: Rename Fallback Debug APK
        if: steps.check_secrets.outputs.has_secrets == 'false'
        run: |
          echo "::warning::Signing secrets are missing. Renaming Debug-signed APK as fallback."
          mv debug_apk/app-debug.apk "lazydex-${{ needs.prepare-build.outputs.VERSION_TAG }}.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-build.outputs.VERSION_TAG }}
          name: LazyDex ${{ needs.prepare-build.outputs.VERSION_TAG }}
          body: |
            You are a release notes generator. Given a list of raw git commit messages below, produce structured release notes following this format.

            ## Rules

            1. Categorize every commit into ONE of these sections (output in this order):
               - ✨ **New** — Added, Introduced, Implemented, Created (brand-new additions)
               - 🧩 **Fixes** — Fixed, Resolved, Corrected, Patched (bug fixes)
               - ⚙️ **Changes** — Changed, Renamed, Updated, Switched, Removed, Configured, Migrated, Refactored (modifications to existing)
               - 🚀 **Improvements** — Improved, Enhanced, Optimized (enhancements to existing features)

            2. Each bullet starts with a past-tense verb listed above for its section.

            3. End every bullet with author attribution: (@user).

            4. Merge similar commits by same author. Remove noise (typo fixes, formatting, merge commits, wip/tmp).

            5. Sort within each section: most user-impactful first.

            6. Omit any section with zero items.

            7. Start with a `##` heading followed by a brief 1-sentence summary of what this release does and why.

            8. End with a `### 📜 **Full Changelog**` section containing a blockquote link: `> [owner/repo@prev...tag](https://github.com/owner/repo/compare/prev...tag)`

            ## Output format

            ## <1-sentence summary>

            ### ✨ **New**
            - <Verb> <what> (@user)

            ### 🧩 **Fixes**
            - Fixed <what> (@user)

            ### ⚙️ **Changes**
            - <Verb> <what> (@user)

            ### 🚀 **Improvements**
            - <Verb> <what> (@user)

            ### 📜 **Full Changelog**
            > [owner/repo@prev...tag](https://github.com/owner/repo/compare/prev...tag)

            ## Raw commits

            ${{ needs.prepare-build.outputs.COMMIT_LOGS }}
          files: |
            lazydex-${{ needs.prepare-build.outputs.VERSION_TAG }}.apk
          draft: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
